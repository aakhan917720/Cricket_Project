name: cricket_scorer
description: Professional Cricket Scorer App with Firebase
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  cupertino_icons: ^1.0.9
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  fluttertoast: ^9.1.0

  # Images & Media
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # State Management
  provider: ^6.1.1

  # Local Storage
  shared_preferences: ^2.2.2

  # Charts & Stats
  fl_chart: ^0.66.2

  # Utilities
  intl: ^0.18.1
  uuid: ^4.3.3
  path_provider: ^2.1.2
  path: ^1.9.0
  firebase_core: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
#    - assets/images/
#    - assets/animations/